# cargo-deny configuration for ROML workspace.
# Run: cargo deny check

[advisories]
# Advisory database fetched from GitHub. Ignored advisories with reason.
ignore = [
    # rand 0.9.2: unsound with custom logger (dev-dep only, fixed in 0.9.3+)
    { id = "RUSTSEC-2026-0097", reason = "dev-dependency only; used in tests" },
]

[licenses]
# Allowlist for published crates. Commercial solver crates may need
# separate license review when graduating from publish=false.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "BSL-1.0",
    "ISC",
    "LicenseRef-ring",
]
# The license field in Cargo.toml uses SPDX identifiers.
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "LicenseRef-ring"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# roml-mosek and roml-xpress are publish=false; their native deps
# are handled separately.
allow = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
