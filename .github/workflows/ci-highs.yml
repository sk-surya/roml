name: CI - HiGHS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Bundled static build — the default for portability.
  # HiGHS is built from source via highs-sys's build script.
  bundled:
    name: HiGHS bundled (${{ matrix.os }})
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build roml-highs (bundled static)
        run: cargo build -p roml-highs

      - name: Clippy
        run: cargo clippy -p roml-highs --all-targets -- -D warnings

      - name: Run tests
        run: cargo test -p roml-highs --all-targets

  # System HiGHS — link against pre-installed library.
  # Requires HiGHS installed on the runner (e.g., via apt/brew).
  system:
    name: HiGHS system (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install HiGHS (system)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y coinor-libhighs-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build roml-highs (system HiGHS)
        run: cargo build -p roml-highs

      - name: Run tests
        run: cargo test -p roml-highs --all-targets

  # MSRV check for HiGHS adapter
  msrv:
    name: HiGHS MSRV (Linux, 1.85)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install HiGHS (system)
        run: |
          sudo apt-get update
          sudo apt-get install -y coinor-libhighs-dev

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build roml-highs
        run: cargo build -p roml-highs

  # Package verification — test from .crate archive
  package:
    name: HiGHS package verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install HiGHS (system)
        run: |
          sudo apt-get update
          sudo apt-get install -y coinor-libhighs-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Package roml-highs
        run: cargo package -p roml-highs --no-verify

      - name: Verify from .crate
        run: |
          cargo new /tmp/highs-consumer
          cd /tmp/highs-consumer
          cargo add roml-highs --path $GITHUB_WORKSPACE
          cargo check
