name: CI - Core

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege GITHUB_TOKEN: only read repository contents.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Formatting check
        run: cargo fmt --all -- --check

      - name: Compile check (all targets)
        run: cargo check -p roml --all-targets

      - name: Clippy lint check
        run: cargo clippy -p roml --all-targets -- -D warnings

      - name: Run tests
        run: cargo test -p roml --all-targets

      - name: Documentation check (no-deps)
        run: cargo doc -p roml --no-deps
        env:
          RUSTDOCFLAGS: '-D warnings'

  msrv:
    name: MSRV (Linux, 1.85)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Formatting check
        run: cargo fmt --all -- --check

      - name: Compile check
        run: cargo check -p roml --all-targets

      - name: Clippy
        run: cargo clippy -p roml --all-targets -- -D warnings

      - name: Run tests
        run: cargo test -p roml --all-targets

      - name: Documentation
        run: cargo doc -p roml --no-deps
        env:
          RUSTDOCFLAGS: '-D warnings'
